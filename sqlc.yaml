version: "2"
sql:
  - engine: "sqlite"
    queries: "database/queries"
    schema: "database/migrations"
    gen:
      go:
        package: "gensql"
        out: "database/gensql"
        emit_pointers_for_null_types: true
        emit_json_tags: true
        json_tags_case_style: "camel"
        overrides:
          - column: "*.created_at"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
